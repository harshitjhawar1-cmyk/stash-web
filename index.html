<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stash Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #f0f0f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { max-width: 560px; width: 100%; padding: 56px 48px; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; background: #111118; text-align: center; }
    .icon { width: 64px; height: 64px; background: linear-gradient(135deg, #f59e0b, #ec4899); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 28px; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 12px; }
    p { color: #888; font-size: 1rem; line-height: 1.6; margin-bottom: 32px; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 36px; }
    .tag { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.08); }
    .btn { display: inline-block; padding: 12px 28px; background: linear-gradient(135deg, #f59e0b, #ec4899); color: #fff; font-size: 0.95rem; font-weight: 600; border-radius: 10px; text-decoration: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌐</div>
    <h1>Stash Web</h1>
    <p>Web companion for the Stash iOS app — access your saved content from any browser, with full-text search, tags, and collections.</p>
    <div class="tags">
      <span class="tag">Next.js</span>
      <span class="tag">TypeScript</span>
      <span class="tag">Supabase</span>
      <span class="tag">Tailwind CSS</span>
    </div>
    <a href="https://github.com/harshitjhawar1-cmyk/stash-web" class="btn">View on GitHub →</a>
  </div>
</body>
</html>
